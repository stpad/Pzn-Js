<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = 5;
        let y = 10;


        document.writeln("X :" + x);
        document.writeln("<br>");
        document.writeln("Y :" + y);
        document.writeln("<br>");
        document.writeln("Apakah X lebih kecil dari Y? " + (x < y));
        document.writeln("<br>");
        document.writeln("Apakah X sama dengan Y? " + (x == y));

    </script>
</body>
</html>
