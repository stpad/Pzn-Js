<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10;
        let b = 3;

        document.writeln("Hasil Penjumlahan: " + (a + b));
        document.writeln("</br>")
        document.writeln("Hasil Pengurangan: " + (a - b));
        document.writeln("</br>")
        document.writeln("Hasil Perkalian: " + (a * b));
        document.writeln("</br>")
        document.writeln("Hasil Pembagian: " + (a / b));
    </script>
</body>
</html>
